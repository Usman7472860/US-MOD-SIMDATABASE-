<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SIM Database – M Usman Chachar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #adff2f;
    --dark: #0a0a0a;
    --card: #111111;
    --border: #adff2f33;
    --text: #e0e0e0;
    --dim: #888;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BG ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(173,255,47,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(173,255,47,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 30px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,.9);
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    color: var(--green);
    letter-spacing: 2px;
    text-shadow: 0 0 20px #adff2f88;
  }
  .logo span { color: #fff; }
  .badge {
    background: var(--green);
    color: #000;
    font-size: .6rem; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── OWNER CARD ── */
  .owner-section {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 24px;
    max-width: 860px; margin: 36px auto 0;
    padding: 28px 32px;
    background: linear-gradient(135deg, #111 60%, #1a2a00 100%);
    border: 1px solid var(--green);
    border-radius: 16px;
    box-shadow: 0 0 40px #adff2f18, inset 0 0 30px #adff2f08;
  }
  .owner-img {
    width: 120px; height: 150px;
    border-radius: 12px;
    border: 3px solid var(--green);
    object-fit: cover;
    object-position: top center;
    box-shadow: 0 0 20px #adff2f55;
    flex-shrink: 0;
  }
  .owner-info { flex: 1; }
  .owner-label {
    font-size: .7rem; letter-spacing: 3px; color: var(--green);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .owner-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 700; color: #fff;
  }
  .owner-sub { font-size: .85rem; color: var(--dim); margin-top: 4px; }
  .owner-verified {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px; font-size: .8rem; color: var(--green);
  }
  .owner-verified svg { width:14px; height:14px; fill:var(--green); }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative; z-index: 2;
    max-width: 860px; margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-title {
    font-family: 'Orbitron', sans-serif;
    font-size: .85rem; letter-spacing: 3px;
    color: var(--green); margin-bottom: 14px;
    text-transform: uppercase;
  }
  .search-box {
    display: flex; gap: 10px;
  }
  .search-box input {
    flex: 1;
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem; font-weight: 600;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-box input:focus {
    border-color: var(--green);
    box-shadow: 0 0 16px #adff2f33;
  }
  .search-box input::placeholder { color: #444; }
  .search-box button {
    background: var(--green);
    color: #000;
    border: none; border-radius: 10px;
    padding: 12px 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: .72rem; font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s;
    white-space: nowrap;
  }
  .search-box button:hover {
    transform: scale(1.04);
    box-shadow: 0 0 20px #adff2f66;
  }
  .search-box button:active { transform: scale(.97); }

  /* ── RESULT CARD ── */
  .result-wrap {
    position: relative; z-index: 2;
    max-width: 860px; margin: 24px auto 0;
    padding: 0 16px 60px;
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px #adff2f0d;
  }
  .result-header {
    background: linear-gradient(90deg, #adff2f22, transparent);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .result-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.3; }
  }
  .result-header span {
    font-family: 'Orbitron', sans-serif;
    font-size: .75rem; letter-spacing: 2px; color: var(--green);
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  @media(max-width:560px) { .result-grid { grid-template-columns: 1fr; } }

  .result-item {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .result-item:nth-child(even) { border-right: none; }
  .result-item:last-child, .result-item:nth-last-child(2) { border-bottom: none; }
  .r-label {
    font-size: .68rem; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 5px;
  }
  .r-value {
    font-size: 1.05rem; font-weight: 600; color: #fff;
    word-break: break-all;
  }
  .r-value.green { color: var(--green); }

  /* STATES */
  .state-box {
    text-align: center; padding: 50px 20px;
  }
  .state-icon { font-size: 2.5rem; margin-bottom: 14px; }
  .state-msg { font-size: 1rem; color: var(--dim); }
  .loading-ring {
    width: 48px; height: 48px;
    border: 3px solid #222;
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  footer {
    position: relative; z-index: 2;
    text-align: center;
    padding: 20px;
    font-size: .75rem; color: #aaa;
    border-top: 1px solid #1a1a1a;
  }
  footer span { color: var(--green); }
</style>
</head>

<div class="search-wrap">
  <div class="search-title">⚡ SIM Lookup</div>
  <div class="search-box">
    <input id="numInput" type="tel" placeholder="03xxxxxxxxx — Enter number to search" maxlength="11"/>
    <button onclick="doSearch()">SEARCH</button>
  </div>
</div>

<div class="result-wrap">
  <div class="result-card" id="resultCard">
    <div class="state-box">
      <div class="state-icon">📡</div>
      <div class="state-msg">Enter a number above to begin lookup</div>
    </div>
  </div>
</div>

<footer>
  Powered by <span>US MOD SIMDatabase</span> &nbsp;·&nbsp; Owner: <span>M Usman Chachar</span>
</footer>

<script>
  const input = document.getElementById('numInput');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const num = input.value.trim();
    if (!num) return shake(input);

    const card = document.getElementById('resultCard');
    card.innerHTML = `
      <div class="state-box">
        <div class="loading-ring"></div>
        <div class="state-msg">Searching database…</div>
      </div>`;

    try {
      const res = await fetch('https://sim-info-api.wasif-ali.workers.dev/?search=' + encodeURIComponent(num), {
        headers: {
          'User-Agent': 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36',
          'Accept': 'application/json'
        }
      });
      const data = await res.json();

      // API format: {success, count, records:[{name,mobile,cnic,address,network}]}
      const records = data?.records;
      if (!data?.success || !Array.isArray(records) || records.length === 0) {
        card.innerHTML = `
          <div class="state-box">
            <div class="state-icon">❌</div>
            <div class="state-msg">No record found for <b style="color:#fff">${num}</b></div>
          </div>`;
        return;
      }

      let recordsHTML = '';
      records.forEach((d, idx) => {
        const fields = [
          ['Name', d.name || '—'],
          ['CNIC', d.cnic || '—'],
          ['Mobile', d.mobile || num],
          ['Network', d.network || '—'],
          ['Address', d.address || '—'],
        ];
        recordsHTML += `
          ${records.length > 1 ? `<div style="padding:10px 24px 0;font-size:.75rem;color:var(--green);letter-spacing:2px;">RECORD ${idx+1}</div>` : ''}
          <div class="result-grid">
            ${fields.map(([label, val]) => `
              <div class="result-item">
                <div class="r-label">${label}</div>
                <div class="r-value">${val}</div>
              </div>
            `).join('')}
          </div>`;
      });

      card.innerHTML = `
        <div class="result-header">
          <div class="dot"></div>
          <span>RECORD FOUND — ${num} (${records.length})</span>
        </div>
        ${recordsHTML}`;

    } catch(e) {
      card.innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-msg">API error. Check connection or try again.</div>
        </div>`;
    }
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.borderColor = '#ff4444';
    setTimeout(() => el.style.borderColor = '', 800);
  }
</script>
